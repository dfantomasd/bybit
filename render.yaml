services:
  - type: web
    name: bybit-monitor
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: trader
    healthCheckPath: /livez
    envVars:
      - key: TRADING_MODE
        value: SHADOW
      - key: RISK_PROFILE
        value: CONSERVATIVE
      - key: LIVE_MODE
        value: "false"
      - key: SHADOW_MODE
        value: "true"
      - key: TELEGRAM_ALLOW_RISK_INCREASE
        value: "false"
      - key: BYBIT_REGION
        value: GLOBAL
      - key: BYBIT_USE_TESTNET
        value: "false"
      - key: BYBIT_CONNECTIVITY_REQUIRED
        value: "false"
      - key: DEFAULT_MARKET_CATEGORY
        value: linear
      - key: REDIS_URL
        value: ""
      - key: REDIS_REQUIRED
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: POSTGRES_DSN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        sync: false
