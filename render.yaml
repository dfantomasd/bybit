services:
  - type: web
    name: bybit-monitor
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: trader
    healthCheckPath: /livez
    envVars:
      - key: TRADING_MODE
        value: SHADOW
      - key: RISK_PROFILE
        value: SCALP
      - key: LIVE_MODE
        value: "false"
      - key: LIVE_ARMED
        value: "false"
      - key: SHADOW_MODE
        value: "true"
      - key: BYBIT_USE_TESTNET
        value: "false"
      - key: TELEGRAM_ALLOW_RISK_INCREASE
        value: "false"
      - key: TELEGRAM_DELIVERY_MODE
        value: auto
      - key: BYBIT_REGION
        value: GLOBAL
      - key: BYBIT_CONNECTIVITY_REQUIRED
        value: "false"
      - key: DEFAULT_MARKET_CATEGORY
        value: linear
      - key: REDIS_URL
        value: ""
      - key: REDIS_REQUIRED
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      # Starter-optimized screener
      - key: STARTER_OPTIMIZED_MODE
        value: "true"
      - key: SCREENER_WIDE_MAX_SYMBOLS
        value: "50"
      - key: SCREENER_FEATURE_MAX_SYMBOLS
        value: "20"
      - key: SCREENER_EXECUTION_CANDIDATES
        value: "10"
      - key: SCREENER_REFRESH_SECONDS
        value: "300"
      - key: SCREENER_SUBSCRIBE_TIMEOUT_SECONDS
        value: "10"
      - key: SCREENER_SUBSCRIBE_MAX_RETRIES
        value: "3"
      - key: SCREENER_MAX_PRICE_USD
        value: "25"
      # Burst/rate limiting
      - key: MAX_NEW_ENTRIES_PER_MINUTE
        value: "4"
      - key: MAX_CONCURRENT_PENDING_ENTRIES
        value: "1"
      - key: MAX_SAME_SIDE_POSITIONS
        value: "2"
      - key: STARTUP_WARMUP_SECONDS
        value: "0"
      - key: SCALP_STRICT_SHADOW
        value: "false"
      - key: SHADOW_RELAX_SCALP_FILTERS
        value: "true"
      - key: MIN_NET_SCALP_RETURN_PCT
        value: "0.04"
      - key: SCALP_MIN_OB_IMBALANCE
        value: "0.08"
      - key: SHADOW_MIN_ATR_MULTIPLE
        value: "0.35"
      - key: MAX_ORDERBOOK_ACTIVE_SYMBOLS
        value: "10"
      - key: PERFORMANCE_FILTER_ENABLED
        value: "false"
      - key: SHADOW_LOSS_GUARD_ENABLED
        value: "false"
      - key: SHADOW_LOSS_GUARD_MIN_CLOSED
        value: "3"
      - key: SHADOW_LOSS_GUARD_WINDOW
        value: "5"
      - key: SHADOW_LOSS_GUARD_MAX_LOSS_RATE
        value: "0.6"
      - key: SHADOW_LOSS_GUARD_MIN_AVG_PNL_PCT
        value: "-0.05"
      - key: SHADOW_LOSS_GUARD_COOLDOWN_SECONDS
        value: "900"
      - key: CANDLE_SEED_RETRY_ATTEMPTS
        value: "3"
      - key: CANDLE_SEED_RETRY_BASE_DELAY_SECONDS
        value: "1.0"
      - key: PREFLIGHT_POSTGRES_REQUIRED
        value: "false"
      - key: PREFLIGHT_POSTGRES_RETRY_ATTEMPTS
        value: "8"
      - key: PREFLIGHT_POSTGRES_RETRY_DELAY_SECONDS
        value: "3.0"
      - key: PREFLIGHT_POSTGRES_OPTIONAL_MAX_ATTEMPTS
        value: "2"
      - key: TRADE_JOURNAL_FETCH_TIMEOUT_SECONDS
        value: "30"
      - key: TRADE_JOURNAL_POOL_MAX_SIZE
        value: "2"
      - key: TRADE_JOURNAL_RECONNECT_MAX_BACKOFF_SECONDS
        value: "1800"
      - key: TRADE_JOURNAL_AUTH_CIRCUIT_BREAKER_MIN_BACKOFF_SECONDS
        value: "900"
      - key: WS_MARKET_DATA_STALE_RECONNECT_SECONDS
        value: "120"
      - key: MARKET_CANDLE_PERSIST_INTERVALS
        value: "1,5,15,60"
      - key: DATA_RETENTION_ENABLED
        value: "true"
      - key: DATA_RETENTION_RUN_ON_STARTUP
        value: "true"
      - key: DATA_RETENTION_INTERVAL_HOURS
        value: "6"
      - key: DATA_RETENTION_EXPORT_ENABLED
        value: "false"
      - key: CANDLE_RETENTION_DAYS_1M
        value: "7"
      - key: CANDLE_RETENTION_DAYS_5M
        value: "30"
      - key: CANDLE_RETENTION_DAYS_15M
        value: "60"
      - key: CANDLE_RETENTION_DAYS_60M
        value: "90"
      - key: FEATURE_SNAPSHOT_RETENTION_DAYS
        value: "30"
      - key: FEATURE_SNAPSHOT_INVALID_RETENTION_DAYS
        value: "3"
      - key: FEATURE_SNAPSHOT_ORPHAN_RETENTION_DAYS
        value: "7"
      - key: PREDICTION_EVENT_ORPHAN_RETENTION_DAYS
        value: "7"
      - key: PREDICTION_OUTCOME_RETENTION_DAYS
        value: "60"
      - key: SHADOW_SIGNAL_RETENTION_DAYS
        value: "7"
      - key: RESOLVED_SNAPSHOT_EXPORT_BEFORE_DELETE_DAYS
        value: "30"
      - key: MODEL_DRIFT_DETECTION_ENABLED
        value: "true"
      - key: MODEL_DRIFT_AUTO_RETRAIN
        value: "true"
      - key: MODEL_ONLINE_LEARNING_ENABLED
        value: "true"
      - key: MODEL_ONLINE_LEARNING_CHECKPOINT_EVERY
        value: "25"
      # Adaptive load governor
      - key: ADAPTIVE_LOAD_GOVERNOR_ENABLED
        value: "true"
      - key: MAX_FEATURE_CYCLE_MS
        value: "3000"
      - key: OUTCOME_RESOLVER_INTERVAL_SECONDS
        value: "60"
      - key: OUTCOME_RESOLVER_BATCH_LIMIT
        value: "1000"
      # Multi-timeframe
      - key: MULTITIMEFRAME_ENABLED
        value: "true"
      - key: MULTITIMEFRAME_INTERVALS
        value: "1,5,15,60"
      - key: TREND_MTF_CONFIRMATION_ENABLED
        value: "true"
      - key: TREND_CONFIRMATION_INTERVALS
        value: "5,15"
      # Advanced alpha feeds/strategies
      - key: TRADE_FLOW_FEED_ENABLED
        value: "true"
      - key: LIQUIDATION_FEED_ENABLED
        value: "true"
      - key: FLOW_TRACKER_WINDOW_SECONDS
        value: "60"
      - key: ORDER_FLOW_STRATEGY_ENABLED
        value: "true"
      - key: FUNDING_ARB_STRATEGY_ENABLED
        value: "true"
      - key: LIQUIDATION_HUNTING_STRATEGY_ENABLED
        value: "true"
      - key: MARKET_MAKING_STRATEGY_ENABLED
        value: "true"
      - key: STAT_ARB_STRATEGY_ENABLED
        value: "true"
      - key: STRATEGY_PRIORITY_ORDER
        value: "order_flow_v1,liquidation_hunting_v1,funding_arbitrage_v1,statistical_arbitrage_v1,market_making_v1,scalp_micro_v1,ema_crossover_v1"
      - key: SCALP_STRATEGY_PRIORITY_ORDER
        value: "scalp_micro_v1,order_flow_v1,liquidation_hunting_v1,funding_arbitrage_v1,statistical_arbitrage_v1,market_making_v1,ema_crossover_v1"
      - key: ORDERBOOK_FEED_ENABLED
        value: "true"
      - key: MODEL_AUTO_TRAIN_HORIZON_MINUTES
        value: "5"
      - key: TRAIN_STRATEGY_ALLOWLIST
        value: "scalp_micro_v1,candle_sampler_v1"
      - key: TRAIN_INCLUDE_CANDLE_BASELINE
        value: "true"
      - key: TRAIN_EXCLUDE_NEGATIVE_BUCKETS
        value: "true"
      - key: TRAIN_LABEL_SPREAD_BPS
        value: "4.0"
      - key: MODEL_LABEL_USE_TPSL_EXIT
        value: "true"
      - key: MODEL_AUTO_TRAIN_LABEL_BPS
        value: "2.0"
      # DB safety gates
      - key: TRADE_JOURNAL_REQUIRED_FOR_ACTIVE
        value: "true"
      - key: DURABLE_ORDER_STATE_REQUIRED_FOR_ACTIVE
        value: "true"
      - key: SYMBOL_SIDE_BLOCK_ENABLED
        value: "true"
      - key: SYMBOL_SIDE_MIN_SAMPLES
        value: "20"
      - key: SYMBOL_SIDE_BLOCK_AVG_BPS
        value: "-2.0"
      # CANARY readiness (off by default)
      - key: CANARY_MAX_OPEN_POSITIONS
        value: "2"
      - key: CANARY_MAX_TOTAL_EXPOSURE_PCT
        value: "45"
      # ML shadow model (shadow scoring only; no live influence)
      - key: MODEL_ENABLED
        value: "false"
      - key: MODEL_TYPE
        value: GBDT
      - key: MODEL_CANDIDATES
        value: "GBDT,LOGREG,SGD"
      - key: MODEL_SHADOW_SCORING_ENABLED
        value: "true"
      - key: MODEL_ALLOW_LIVE_DECISIONS
        value: "false"
      - key: MODEL_AUTO_TRAIN_ENABLED
        value: "true"
      - key: MODEL_AUTO_PROMOTE_ENABLED
        value: "true"
      - key: MODEL_AUTO_TRAIN_MIN_SAMPLES
        value: "1000"
      - key: MODEL_AUTO_TRAIN_INCREMENT_SAMPLES
        value: "1000"
      - key: MODEL_AUTO_TRAIN_CHECK_SECONDS
        value: "300"
      # Auto-promotion (disabled by default — requires explicit opt-in)
      - key: MODEL_AUTO_PROMOTE_CHECK_SECONDS
        value: "600"
      - key: MODEL_AUTO_PROMOTE_MIN_SIGNALS
        value: "30"
      - key: MODEL_AUTO_PROMOTE_MIN_LIFT_BPS
        value: "0.5"
      - key: MODEL_AUTO_PROMOTE_MIN_QUALITY
        value: "WEAK"
      - key: MODEL_SHADOW_GATE_ENABLED
        value: "true"
      - key: MODEL_SHADOW_GATE_THRESHOLD
        value: "0.50"
      - key: MODEL_GATE_CANARY_ENABLED
        value: "false"
      - key: MODEL_GATE_CANARY_MAX_BLOCK_RATE_PCT
        value: "60"
      - key: MODEL_GATE_CANARY_ALLOW_EVERY_NTH_BLOCKED
        value: "3"
      - key: MODEL_PAPER_NOTIONAL_USD
        value: "5"
      # Secrets (not synced — set via Render dashboard)
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: POSTGRES_DSN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        sync: false
