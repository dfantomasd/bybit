name: PR35 Diagnostics

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  diagnostics:
    name: Collect ruff and pytest diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Collect ruff output
        run: |
          set +e
          ruff check src/ tests/ > ruff.log 2>&1
          echo "$?" > ruff.exit
          cat ruff.log
          exit 0

      - name: Collect pytest output
        env:
          BYBIT_API_KEY: test-key
          BYBIT_API_SECRET: test-secret
          POSTGRES_DSN: postgresql+asyncpg://trader:trader@localhost:5432/trader
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_BOT_TOKEN: "1234567890:test"
          TELEGRAM_ALLOWED_CHAT_IDS: "[123]"
          TRADING_MODE: TESTNET
          LIVE_MODE: "false"
        run: |
          set +e
          pytest tests/unit/ -v --tb=short > pytest.log 2>&1
          echo "$?" > pytest.exit
          tail -n 250 pytest.log
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr35-diagnostics
          path: |
            ruff.log
            ruff.exit
            pytest.log
            pytest.exit
